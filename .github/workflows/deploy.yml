name: Deploy Gate Zero to GitHub Pages

on:
  push:
    branches: ["main"]

# Permissões necessárias para que o GitHub Actions possa fazer o deploy
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci

      - name: Compilar Projeto (Build)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do Artefato (pasta dist do Vite)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4